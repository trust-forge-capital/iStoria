name: Build and Test

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  GO_VERSION: '1.23'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Run tests
      run: go test -v -race ./...
    
    - name: Run go fmt
      run: go fmt ./...
    
    - name: Run go vet
      run: go vet ./...

  build:
    name: Build ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: istoria-darwin-arm64
            ext: ''
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: istoria-darwin-amd64
            ext: ''
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: istoria-linux-amd64
            ext: ''
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: istoria-linux-arm64
            ext: ''
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: istoria-windows-amd64
            ext: .exe
          - os: ubuntu-latest
            goos: windows
            goarch: arm64
            artifact: istoria-windows-arm64
            ext: .exe
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Get version
      id: version
      shell: bash
      run: |
        VERSION=${{ github.ref_name }}
        if [[ "$VERSION" == "refs/tags/"* ]]; then
          VERSION=${VERSION#refs/tags/}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Build
      shell: bash
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        VERSION: ${{ github.ref_name }}
      run: |
        VERSION="${VERSION#refs/tags/}"
        go build -ldflags="-s -w -X main.version=${VERSION}" -o ${{ matrix.artifact }}${{ matrix.ext }} .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
    
    - name: List artifacts
      run: ls -la artifacts/
    
    - name: Prepare release notes
      id: release_notes
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/}
        
        # Generate changelog from commits
        CHANGELOG=$(git log --pretty=format:"- %s (%h)" -n 20)
        
        cat << EOF > release_body.md
        ## iStoria ${TAG_VERSION}
        
        Cross-platform hardware monitoring CLI
        
        ### Changes
        $CHANGELOG
        
        ### Downloads
        - macOS (Apple Silicon): istoria-darwin-arm64
        - macOS (Intel): istoria-darwin-amd64
        - Linux (amd64): istoria-linux-amd64
        - Linux (arm64): istoria-linux-arm64
        - Windows: istoria-windows-amd64.exe
        EOF
        
        cat release_body.md
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_body.md
        files: |
          artifacts/istoria-darwin-arm64
          artifacts/istoria-darwin-amd64
          artifacts/istoria-linux-amd64
          artifacts/istoria-linux-arm64
          artifacts/istoria-windows-amd64.exe
          artifacts/istoria-windows-arm64.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
